<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
      width: 300px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .display {
      background: #0f3460;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 20px;
      text-align: right;
    }

    .display .expression {
      font-size: 14px;
      color: #a0aec0;
      min-height: 20px;
      margin-bottom: 6px;
    }

    .display .result {
      font-size: 36px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -1px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      background: #1a1a2e;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      height: 60px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover { background: #253352; }
    button:active { transform: scale(0.95); background: #2d3d66; }

    .btn-clear { background: #e53e3e; color: #fff; }
    .btn-clear:hover { background: #c53030; }

    .btn-operator { background: #0f3460; color: #63b3ed; font-size: 22px; }
    .btn-operator:hover { background: #1a4a7a; }
    .btn-operator.active { background: #3182ce; color: #fff; }

    .btn-equals {
      background: #3182ce;
      color: #fff;
      font-size: 22px;
    }
    .btn-equals:hover { background: #2b6cb0; }

    .btn-zero { grid-column: span 2; }
  </style>
</head>
<body>

  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn-clear" onclick="clearAll()">C</button>
      <button onclick="toggleSign()" style="color:#a0aec0; font-size:14px;">+/−</button>
      <button onclick="percent()" style="color:#a0aec0;">%</button>
      <button class="btn-operator" id="op-+" onclick="setOperator('+')">+</button>

      <!-- Row 2 -->
      <button onclick="inputNum('7')">7</button>
      <button onclick="inputNum('8')">8</button>
      <button onclick="inputNum('9')">9</button>
      <button class="btn-operator" id="op--" onclick="setOperator('-')">−</button>

      <!-- Row 3 -->
      <button onclick="inputNum('4')">4</button>
      <button onclick="inputNum('5')">5</button>
      <button onclick="inputNum('6')">6</button>
      <button class="btn-operator" id="op-*" onclick="setOperator('*')">×</button>

      <!-- Row 4 -->
      <button onclick="inputNum('1')">1</button>
      <button onclick="inputNum('2')">2</button>
      <button onclick="inputNum('3')">3</button>
      <button class="btn-equals" onclick="calculate()" style="grid-row: span 2;">=</button>

      <!-- Row 5 -->
      <button class="btn-zero" onclick="inputNum('0')">0</button>
      <button onclick="inputNum('.')">.</button>
    </div>
  </div>

  <script>
    let current = '0';
    let firstNumber = null;
    let operator = null;
    let freshInput = false;

    const resultEl = document.getElementById('result');
    const expressionEl = document.getElementById('expression');

    function updateDisplay() {
      resultEl.textContent = parseFloat(current).toLocaleString('en-US', { maximumFractionDigits: 9 });
    }

    function highlightOperator(op) {
      document.querySelectorAll('.btn-operator').forEach(btn => btn.classList.remove('active'));
      if (op) {
        const btn = document.getElementById('op-' + op);
        if (btn) btn.classList.add('active');
      }
    }

    function inputNum(value) {
      // Clear operator highlight once user starts typing next number
      if (freshInput) highlightOperator(null);

      if (value === '.') {
        if (freshInput) { current = '0.'; freshInput = false; resultEl.textContent = current; return; }
        if (current.includes('.')) return;
        current += '.';
        resultEl.textContent = current;
        return;
      }

      if (freshInput || current === '0') {
        current = value;
        freshInput = false;
      } else {
        if (current.replace('-', '').replace('.', '').length >= 12) return;
        current += value;
      }
      updateDisplay();
    }

    function toggleSign() {
      current = String(parseFloat(current) * -1);
      updateDisplay();
    }

    function percent() {
      current = String(parseFloat(current) / 100);
      updateDisplay();
    }

    function compute(a, b, op) {
      if (op === '+') return a + b;
      if (op === '-') return a - b;
      if (op === '*') return a * b;
      return b;
    }

    function setOperator(op) {
      if (firstNumber !== null && !freshInput) {
        const result = compute(parseFloat(firstNumber), parseFloat(current), operator);
        firstNumber = String(result);
        current = String(result);
        updateDisplay();
      } else {
        firstNumber = current;
      }
      operator = op;
      freshInput = true;
      highlightOperator(op);
      expressionEl.textContent = firstNumber + ' ' + (op === '-' ? '−' : op === '*' ? '×' : op);
    }

    function calculate() {
      if (firstNumber === null || operator === null) return;
      const a = parseFloat(firstNumber);
      const b = parseFloat(current);
      const symbol = operator === '-' ? '−' : operator === '*' ? '×' : operator;
      expressionEl.textContent = firstNumber + ' ' + symbol + ' ' + current + ' =';
      const result = compute(a, b, operator);
      current = String(result);
      firstNumber = null;
      operator = null;
      freshInput = true;
      highlightOperator(null);
      updateDisplay();
    }

    function clearAll() {
      current = '0';
      firstNumber = null;
      operator = null;
      freshInput = false;
      expressionEl.textContent = '';
      highlightOperator(null);
      updateDisplay();
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') inputNum(e.key);
      else if (e.key === '.') inputNum('.');
      else if (e.key === '+') setOperator('+');
      else if (e.key === '-') setOperator('-');
      else if (e.key === '*') setOperator('*');
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (current.length > 1) current = current.slice(0, -1);
        else current = '0';
        updateDisplay();
      }
    });
  </script>

</body>
</html>
